# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy via Dashboard → New → Blueprint → connect this GitHub repo

databases:
  - name: mentor-bridge-db
    plan: free
    databaseName: mentor_bridge_db
    user: mentor_bridge

services:
  # FastAPI backend
  - type: web
    name: mentor-bridge-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: mentor-bridge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: AUTO_CREATE_TABLES
        value: "False"
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: mentor-bridge-web
          envVarKey: RENDER_EXTERNAL_URL

  # React frontend (static site — no plan field; static sites are always free)
  - type: web
    name: mentor-bridge-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mentor-bridge-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_WS_URL
        fromService:
          type: web
          name: mentor-bridge-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
